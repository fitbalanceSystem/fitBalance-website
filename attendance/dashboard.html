<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitBalance Hub - נוכחות</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ec4899">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { height: 100%; }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-rose-50 via-pink-50 to-fuchsia-100 select-none touch-manipulation">

<div class="min-h-screen flex flex-col p-3">

  <header class="bg-white p-3 rounded-xl shadow text-center font-bold text-pink-600">
    FitBalance - Attendance
  </header>

  <main class="flex-1 flex flex-col gap-4 mt-3">

    <input id="numberInput"
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      placeholder="הקלידי מספר"
      class="w-full p-3 rounded-xl border text-center text-xl">

    <div class="grid grid-cols-3 gap-3">
      <button class="p-4 bg-white rounded-xl shadow">1</button>
      <button class="p-4 bg-white rounded-xl shadow">2</button>
      <button class="p-4 bg-white rounded-xl shadow">3</button>
      <button class="p-4 bg-white rounded-xl shadow">4</button>
      <button class="p-4 bg-white rounded-xl shadow">5</button>
      <button class="p-4 bg-white rounded-xl shadow">6</button>
      <button class="p-4 bg-white rounded-xl shadow">7</button>
      <button class="p-4 bg-white rounded-xl shadow">8</button>
      <button class="p-4 bg-white rounded-xl shadow">9</button>
      <button class="p-4 bg-red-500 text-white rounded-xl shadow">⌫</button>
      <button class="p-4 bg-white rounded-xl shadow">0</button>
      <button class="p-4 bg-pink-500 text-white rounded-xl shadow">אישור</button>
    </div>

  </main>

</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>

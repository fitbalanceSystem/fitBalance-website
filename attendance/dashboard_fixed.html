<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>FitBalance Hub</title><link rel="manifest" href="/manifest.json"><meta name="theme-color" content="#ec4899"><script src="https://cdn.tailwindcss.com"></script><style>html,body{height:100%}button{min-height:60px}</style></head><body class="min-h-screen bg-gradient-to-br from-rose-50 via-pink-50 to-fuchsia-100 select-none touch-manipulation"><div class="min-h-screen flex flex-col p-4 md:p-10 max-w-xl md:max-w-2xl mx-auto"><header class="bg-white p-4 md:p-7 rounded-2xl shadow text-center font-bold text-pink-600 text-xl md:text-3xl">FitBalance - Attendance</header><main class="flex-1 flex flex-col gap-4 md:gap-6 mt-4 md:mt-8"><input id="numberInput" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="הקלידי מספר" class="w-full p-4 md:p-6 rounded-2xl border text-center text-2xl md:text-4xl font-semibold shadow-sm focus:outline-none focus:ring-2 focus:ring-pink-400"><div class="grid grid-cols-3 gap-3 md:gap-5"><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">1</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">2</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">3</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">4</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">5</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">6</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">7</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">8</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">9</button><button class="p-5 md:p-9 bg-red-500 text-white rounded-2xl shadow text-2xl md:text-4xl active:bg-red-600">&#x232B;</button><button class="p-5 md:p-9 bg-white rounded-2xl shadow text-2xl md:text-4xl font-semibold active:bg-pink-50">0</button><button class="p-5 md:p-9 bg-pink-500 text-white rounded-2xl shadow text-xl md:text-3xl font-bold active:bg-pink-600">אישור</button></div></main></div><script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js")}const input=document.getElementById("numberInput");document.querySelectorAll("button").forEach(btn=>{btn.addEventListener("click",()=>{const val=btn.textContent.trim();if(val==="⌫"){input.value=input.value.slice(0,-1)}else if(val==="אישור"){console.log("submit:",input.value)}else{input.value+=val}})});</script></body></html>

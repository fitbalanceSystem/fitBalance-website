<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>לקוחות</title>
  <link rel="stylesheet" href="css/customersAnsInstructors.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/customers.js" defer></script>
  <style>
    .sort-btn { cursor: pointer; user-select: none; }
    .sort-btn:hover { background: #f9c8d4; }
    .sort-btn .sort-icon { font-size: 10px; margin-right: 4px; color: #888; }
    #countBadge { background:#2563eb; color:white; border-radius:999px; padding:2px 10px; font-size:13px; font-weight:bold; }

    /* מודאל צפייה */
    #viewModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; }
    #viewModal.open { display:flex; }
    #viewModalBox { background:white; border-radius:16px; width:480px; max-width:95vw; max-height:90vh; overflow-y:auto; direction:rtl; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
    .vm-header { background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; padding:24px; border-radius:16px 16px 0 0; }
    .vm-avatar { width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,0.3); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:bold; margin-bottom:12px; }
    .vm-body { padding:24px; }
    .vm-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #f3f4f6; }
    .vm-row:last-child { border-bottom:none; }
    .vm-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .vm-label { font-size:12px; color:#9ca3af; }
    .vm-value { font-size:14px; font-weight:600; color:#111; }
    .vm-status-badge { display:inline-block; padding:4px 12px; border-radius:999px; font-size:13px; font-weight:bold; }
  </style>
</head>
<body>
  <div class="container">
    <div id="sidebar-placeholder"></div>
    <script src="utilities/sidebar.js"></script>

    <main class="main-content">
      <header class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
        <h1>לקוחות</h1>
        <div style="display:flex;gap:8px;">
          <button id="newCustomerBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition text-sm">+ לקוחה חדשה</button>
          <button id="exportCustomersBtn" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition text-sm">⬇️ ייצא</button>
        </div>
      </header>

      <!-- חיפוש + סינון + ספירה -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="חיפוש לפי שם, טלפון..." />
        <select id="statusFilter"></select>
        <i class="fas fa-search"></i>
      </div>
      <div style="margin-bottom:10px; display:flex; align-items:center; gap:8px;">
        <span style="color:#555; font-size:14px;">מוצגות:</span>
        <span id="countBadge">0</span>
        <span style="color:#555; font-size:14px;">לקוחות</span>
      </div>

      <div class="pagination">
        <button id="prevPage" class="page-btn"><i class="fas fa-chevron-right"></i></button>
        <span id="pageInfo"></span>
        <button id="nextPage" class="page-btn"><i class="fas fa-chevron-left"></i></button>
      </div>

      <section class="table-section">
        <table id="customersTable" class="customers-table">
          <thead>
            <tr>
              <th class="sort-btn" onclick="sortBy('idValue')">ת.ז <span class="sort-icon" id="sort-idValue"></span></th>
              <th class="sort-btn" onclick="sortBy('firstName')">שם פרטי <span class="sort-icon" id="sort-firstName"></span></th>
              <th class="sort-btn" onclick="sortBy('lastName')">שם משפחה <span class="sort-icon" id="sort-lastName"></span></th>
              <th class="sort-btn" onclick="sortBy('birthDate')">ת.לידה <span class="sort-icon" id="sort-birthDate"></span></th>
              <th>אימייל</th>
              <th class="sort-btn" onclick="sortBy('mobile')">נייד <span class="sort-icon" id="sort-mobile"></span></th>
              <th>סטטוס</th>
              <th>פעולות</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
  </div>

  <!-- מודאל צפייה יפה -->
  <div id="viewModal">
    <div id="viewModalBox">
      <div class="vm-header">
        <div class="vm-avatar" id="vmAvatar">?</div>
        <div style="font-size:22px; font-weight:bold;" id="vmFullName"></div>
        <div style="font-size:13px; opacity:0.85; margin-top:4px;" id="vmStatusBadgeHeader"></div>
      </div>
      <div class="vm-body">
        <div class="vm-row">
          <div class="vm-icon" style="background:#fef3c7;">🪪</div>
          <div><div class="vm-label">תעודת זהות</div><div class="vm-value" id="vmId"></div></div>
        </div>
        <div class="vm-row">
          <div class="vm-icon" style="background:#dbeafe;">📱</div>
          <div><div class="vm-label">נייד</div><div class="vm-value" id="vmMobile"></div></div>
        </div>
        <div class="vm-row">
          <div class="vm-icon" style="background:#d1fae5;">✉️</div>
          <div><div class="vm-label">אימייל</div><div class="vm-value" id="vmEmail"></div></div>
        </div>
        <div class="vm-row">
          <div class="vm-icon" style="background:#fce7f3;">🎂</div>
          <div><div class="vm-label">תאריך לידה</div><div class="vm-value" id="vmBirth"></div></div>
        </div>
        <div class="vm-row">
          <div class="vm-icon" style="background:#ede9fe;">🏠</div>
          <div><div class="vm-label">כתובת</div><div class="vm-value" id="vmAddress"></div></div>
        </div>
        <div class="vm-row">
          <div class="vm-icon" style="background:#fef9c3;">💰</div>
          <div><div class="vm-label">חוב</div><div class="vm-value" id="vmDebt"></div></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
          <button id="vmEditBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">✏️ עריכה</button>
          <button onclick="closeViewModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-medium hover:bg-gray-200">סגור</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

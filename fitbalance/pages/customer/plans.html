<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitBalance | תוכניות ונוכחות</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .progress-bar { height: 10px; border-radius: 999px; background: #f3e8ff; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg,#ec4899,#8b5cf6); transition: width 1s ease; }
    .plan-card.recommended { border: 2px solid #ec4899; position: relative; }
    .plan-card.recommended::before { content:'מומלץ'; position:absolute; top:-12px; right:50%; transform:translateX(50%);
      background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; font-size:.7rem; font-weight:700;
      padding:.2rem .8rem; border-radius:999px; white-space:nowrap; }
  </style>
</head>
<body>

<div class="page-content p-5 max-w-4xl mx-auto space-y-6">

  <!-- Active plan -->
  <div class="card p-6 fade-in">
    <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
      <i class="fas fa-id-card text-pink-500"></i> התוכנית הפעילה שלי
    </h2>
    <div id="active-plan">
      <div class="skeleton h-28 rounded-xl"></div>
    </div>
  </div>

  <!-- Attendance heatmap -->
  <div class="card p-6 fade-in">
    <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
      <i class="fas fa-fire text-orange-500"></i> נוכחות החודש
    </h2>
    <div id="heatmap" class="grid gap-2" style="grid-template-columns: repeat(7, 1fr)">
      <!-- injected by JS -->
    </div>
    <div class="flex items-center gap-3 mt-4 text-xs text-gray-400">
      <span>פחות</span>
      <div class="flex gap-1">
        <div class="w-4 h-4 rounded bg-gray-100"></div>
        <div class="w-4 h-4 rounded bg-pink-200"></div>
        <div class="w-4 h-4 rounded bg-pink-400"></div>
        <div class="w-4 h-4 rounded bg-pink-600"></div>
      </div>
      <span>יותר</span>
    </div>
  </div>

  <!-- Attendance history -->
  <div class="card p-6 fade-in">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
        <i class="fas fa-list-check text-purple-500"></i> היסטוריית נוכחות
      </h2>
      <span id="attendance-count" class="badge bg-pink-100 text-pink-700">טוען...</span>
    </div>
    <div id="attendance-list" class="space-y-3">
      <div class="skeleton h-14 rounded-xl"></div>
      <div class="skeleton h-14 rounded-xl"></div>
      <div class="skeleton h-14 rounded-xl"></div>
    </div>
  </div>

  <!-- Available plans -->
  <div class="card p-6 fade-in">
    <h2 class="text-lg font-bold text-gray-800 mb-5 flex items-center gap-2">
      <i class="fas fa-tags text-green-500"></i> תוכניות זמינות
    </h2>
    <div id="plans-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div class="skeleton h-48 rounded-2xl"></div>
      <div class="skeleton h-48 rounded-2xl"></div>
      <div class="skeleton h-48 rounded-2xl"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../utils/constants.js"></script>
<script src="../../utils/storage.js"></script>
<script src="../../utils/formatter.js"></script>
<script src="../../utils/helpers.js"></script>
<script src="../../utils/popup.js"></script>
<script src="../../services/supabaseClient.js"></script>
<script src="../../services/authService.js"></script>
<script src="../../services/customerService.js"></script>
<script src="../../middleware/auth.js"></script>
<script src="../../layouts/layout.js"></script>
<script src="../../assets/js/pages/customer/shop.js"></script>
</body>
</html>

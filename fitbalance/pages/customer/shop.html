<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitBalance | חנות</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .product-card { transition: transform .25s, box-shadow .25s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.1); }
    .qty-btn { width:28px; height:28px; border-radius:50%; border:2px solid #e5e7eb; display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:700; transition:all .15s; }
    .qty-btn:hover { border-color:#ec4899; color:#ec4899; }
    #cart-drawer { transition: transform .3s ease; }
    #cart-drawer.open { transform: translateX(0) !important; }
    .cat-btn.active { background: linear-gradient(135deg,#ec4899,#8b5cf6); color:white; }
  </style>
</head>
<body>

<div class="page-content p-5 max-w-5xl mx-auto">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6 fade-in">
    <div>
      <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
        <i class="fas fa-shopping-bag text-pink-500"></i> חנות
      </h1>
      <p class="text-gray-500 text-sm mt-1">ציוד ספורט איכותי במחירים מיוחדים</p>
    </div>
    <button id="cart-btn" class="relative btn-primary flex items-center gap-2">
      <i class="fas fa-shopping-cart"></i>
      <span>עגלה</span>
      <span id="cart-count" class="absolute -top-2 -left-2 w-5 h-5 bg-white text-pink-600 rounded-full text-xs font-bold flex items-center justify-center shadow hidden">0</span>
    </button>
  </div>

  <!-- Category filter -->
  <div class="flex gap-2 overflow-x-auto pb-2 mb-6 fade-in" id="cat-filters">
    <button class="cat-btn active whitespace-nowrap px-4 py-2 rounded-xl text-sm font-semibold border-2 border-transparent bg-gray-100 text-gray-700 transition-all" data-cat="all">הכל</button>
  </div>

  <!-- Products grid -->
  <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 fade-in">
    <div class="skeleton h-56 rounded-2xl"></div>
    <div class="skeleton h-56 rounded-2xl"></div>
    <div class="skeleton h-56 rounded-2xl"></div>
    <div class="skeleton h-56 rounded-2xl"></div>
  </div>

  <!-- Orders history -->
  <div class="card p-6 mt-8 fade-in">
    <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
      <i class="fas fa-receipt text-purple-500"></i> הזמנות קודמות
    </h2>
    <div id="orders-list" class="space-y-3">
      <div class="skeleton h-14 rounded-xl"></div>
      <div class="skeleton h-14 rounded-xl"></div>
    </div>
  </div>

</div>

<!-- Cart drawer -->
<div id="cart-drawer" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-50 flex flex-col" style="transform:translateX(100%)">
  <div class="flex items-center justify-between p-5 border-b">
    <h2 class="text-lg font-bold text-gray-800">🛒 עגלת קניות</h2>
    <button id="close-cart" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
  </div>
  <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
  <div class="p-5 border-t">
    <div class="flex justify-between text-lg font-bold text-gray-800 mb-4">
      <span>סה"כ</span>
      <span id="cart-total" class="gradient-text">₪0</span>
    </div>
    <button id="checkout-btn" class="btn-primary w-full flex items-center justify-center gap-2">
      <i class="fas fa-credit-card"></i> לתשלום
    </button>
  </div>
</div>
<div id="cart-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-40 hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../utils/constants.js"></script>
<script src="../../utils/storage.js"></script>
<script src="../../utils/formatter.js"></script>
<script src="../../utils/helpers.js"></script>
<script src="../../utils/popup.js"></script>
<script src="../../services/supabaseClient.js"></script>
<script src="../../services/authService.js"></script>
<script src="../../services/customerService.js"></script>
<script src="../../middleware/auth.js"></script>
<script src="../../layouts/layout.js"></script>
<script src="../../assets/js/pages/customer/shop.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="/assets/icons/icon3.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>חוגי ריקוד לבנות ונערות</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:Heebo,sans-serif}
.hero{background:url('assets/hero.jpg') center/cover;height:92vh;position:relative}
.hero:before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.45)}
.card{transition:.3s}.card:hover{transform:translateY(-8px)}
</style>
</head>
<body class="bg-gray-50">
<header class="hero flex items-center justify-center">
<div class="relative z-10 text-center text-white px-6">
<h1 class="text-6xl font-black">חוגי ריקוד לבנות ונערות</h1>
<p class="mt-6 text-2xl">מקצועיות • ערכים • מופע סוף שנה • יחס אישי</p>
<a href="#lead" class="mt-8 inline-block bg-pink-600 px-10 py-4 rounded-full text-xl">השאירי פרטים</a>
</div>
</header>

<section id="lead" class="max-w-4xl mx-auto -mt-16 relative z-20 bg-white rounded-3xl shadow-2xl p-8">
<h2 class="text-3xl font-bold text-center mb-6">השאירי פרטים ונחזור אלייך בהקדם</h2>
<form id="leadForm" class="grid md:grid-cols-2 gap-4">
<input id="child_name" class="border p-3 rounded-xl" placeholder="שם הילדה">
<input id="mother_name" class="border p-3 rounded-xl" placeholder="שם האם">
<input id="phone" class="border p-3 rounded-xl" placeholder="נייד">
<input id="email" class="border p-3 rounded-xl" placeholder="מייל">
<select id="group_name" class="border p-3 rounded-xl md:col-span-2">
<option>כיתה ג'</option><option>כיתה ד'</option><option>כיתה ה'</option>
<option>כיתה ו'</option><option>כיתה ז'</option><option>כיתה ח'</option>
<option>כיתה ט'</option><option>כיתה י'</option><option>כיתה י"א</option>
<option>כיתה י"ב</option><option>היפ הופ לנשים</option>
</select>
<button class="md:col-span-2 bg-pink-600 text-white p-4 rounded-xl text-xl">שלחי פרטים</button>
</form>
</section>

<section class="max-w-6xl mx-auto py-20 px-6">
<h2 class="text-4xl font-bold text-center mb-10">גלריה</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<img src="assets/gallery1.jpg" class="rounded-2xl">
<img src="assets/gallery2.jpg" class="rounded-2xl">
<img src="assets/gallery3.jpg" class="rounded-2xl">
<img src="assets/gallery4.jpg" class="rounded-2xl">
</div>
</section>

<script src="app.js"></script>
</body></html>

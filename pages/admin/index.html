<!DOCTYPE html>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../../assets/icons/icon.png">
  <title>מערכת ניהול | FitBalance</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body>
  <div class="container">
    <div id="sidebar-placeholder"></div>
    <script src="utilities/sidebar.js"></script>

    <main class="main-content">
      <header class="page-header">
        <h1>מערכת לניהול חוגים</h1>
      </header>

      <section style="margin-top:8px">
        <p style="color:#6b7280;font-size:14px;margin-bottom:24px">ברוכה הבאה! כאן תוכלי לנהל את כל הלקוחות, המדריכות, החוגים והדוחות שלך.</p>
      </section>

      <section style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">
        <a href="customers.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;background:white;border-radius:16px;border:1px solid #f3f0ff;box-shadow:0 2px 16px rgba(139,92,246,.07);text-decoration:none;color:#1f2937;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <span style="font-size:28px">👥</span>
          <span style="font-weight:600;font-size:14px">לקוחות</span>
        </a>
        <a href="instructors.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;background:white;border-radius:16px;border:1px solid #f3f0ff;box-shadow:0 2px 16px rgba(139,92,246,.07);text-decoration:none;color:#1f2937;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <span style="font-size:28px">🧑‍🏫</span>
          <span style="font-weight:600;font-size:14px">מדריכות</span>
        </a>
        <a href="reports.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;background:white;border-radius:16px;border:1px solid #f3f0ff;box-shadow:0 2px 16px rgba(139,92,246,.07);text-decoration:none;color:#1f2937;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <span style="font-size:28px">📊</span>
          <span style="font-weight:600;font-size:14px">דוחות</span>
        </a>
        <a href="jobs.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;background:white;border-radius:16px;border:1px solid #f3f0ff;box-shadow:0 2px 16px rgba(139,92,246,.07);text-decoration:none;color:#1f2937;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <span style="font-size:28px">⚙️</span>
          <span style="font-weight:600;font-size:14px">תהליכים</span>
        </a>
        <a href="system-settings.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;background:white;border-radius:16px;border:1px solid #f3f0ff;box-shadow:0 2px 16px rgba(139,92,246,.07);text-decoration:none;color:#1f2937;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <span style="font-size:28px">🛠️</span>
          <span style="font-weight:600;font-size:14px">הגדרות מערכת</span>
        </a>
        <a href="automations.html" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;background:white;border-radius:16px;border:1px solid #f3f0ff;box-shadow:0 2px 16px rgba(139,92,246,.07);text-decoration:none;color:#1f2937;transition:transform .2s" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <span style="font-size:28px">⚡</span>
          <span style="font-weight:600;font-size:14px">אוטומציות</span>
        </a>
      </section>
    </main>
  </div>
</body>
</html>

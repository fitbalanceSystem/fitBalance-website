<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="../../assets/icons/icon.png">
  <title>הזמנות</title>
  <link rel="stylesheet" href="css/admin-theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../../services/supabaseClient.js"></script>
  <style>
    .badge-pending   { background:#fef3c7; color:#92400e; border-radius:999px; padding:2px 10px; font-size:11px; font-weight:700; }
    .badge-completed { background:#d1fae5; color:#065f46; border-radius:999px; padding:2px 10px; font-size:11px; font-weight:700; }
    .badge-cancelled { background:#fee2e2; color:#991b1b; border-radius:999px; padding:2px 10px; font-size:11px; font-weight:700; }
    #orderModal { display:none; position:fixed; inset:0; background:rgba(15,10,40,.65); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
    #orderModal.open { display:flex; }
    .kpi { background:white; border-radius:14px; padding:16px 20px; border:1px solid #f3f0ff; box-shadow:0 2px 12px rgba(139,92,246,.07); }
    .kpi-val { font-size:24px; font-weight:800; background:linear-gradient(135deg,#ec4899,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .kpi-lbl { font-size:12px; color:#9ca3af; margin-top:2px; }
  </style>
</head>
<body>
<div class="container">
  <div id="sidebar-placeholder"></div>

  <main class="main-content">
    <header class="page-header">
      <h1>📦 הזמנות</h1>
    </header>

    <!-- KPIs -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;" id="kpiRow">
      <div class="kpi"><div class="kpi-val" id="kpi-total">—</div><div class="kpi-lbl">סה"כ הזמנות</div></div>
      <div class="kpi"><div class="kpi-val" id="kpi-pending">—</div><div class="kpi-lbl">ממתינות</div></div>
      <div class="kpi"><div class="kpi-val" id="kpi-completed">—</div><div class="kpi-lbl">הושלמו</div></div>
      <div class="kpi"><div class="kpi-val" id="kpi-revenue">—</div><div class="kpi-lbl">סה"כ הכנסות</div></div>
    </div>

    <!-- חיפוש + סינון -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="חיפוש לפי שם / טלפון..." />
      <select id="statusFilter">
        <option value="">כל הסטטוסים</option>
        <option value="pending">ממתין</option>
        <option value="completed">הושלם</option>
        <option value="cancelled">בוטל</option>
      </select>
      <select id="typeFilter">
        <option value="">הכל</option>
        <option value="customer">לקוחות רשומים</option>
        <option value="guest">אורחים</option>
      </select>
      <i class="fas fa-search"></i>
    </div>

    <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;">
      <span style="color:#555;font-size:14px;">מוצגות:</span>
      <span id="countBadge">0</span>
      <span style="color:#555;font-size:14px;">הזמנות</span>
    </div>

    <div class="table-section">
      <table class="customers-table">
        <thead>
          <tr>
            <th>#</th>
            <th>תאריך</th>
            <th>לקוח</th>
            <th>טלפון</th>
            <th>פריטים</th>
            <th>סה"כ</th>
            <th>סטטוס</th>
            <th>פעולות</th>
          </tr>
        </thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- מודאל פרטי הזמנה -->
<div id="orderModal">
  <div style="background:white;border-radius:20px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2);">
    <div style="background:linear-gradient(135deg,#ec4899,#8b5cf6);padding:20px 24px;border-radius:20px 20px 0 0;display:flex;justify-content:space-between;align-items:center;">
      <h2 id="modalTitle" style="color:white;font-size:18px;font-weight:800;margin:0;">פרטי הזמנה</h2>
      <button onclick="closeModal()" style="background:rgba(255,255,255,.2);border:none;color:white;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;">✕</button>
    </div>
    <div style="padding:24px;">
      <div id="modalContent"></div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid #f3f0ff;">
        <label style="font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:6px;">עדכון סטטוס</label>
        <div style="display:flex;gap:8px;">
          <select id="statusSelect" style="flex:1;border:1.5px solid #e5e7eb;border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;outline:none;">
            <option value="pending">ממתין</option>
            <option value="completed">הושלם</option>
            <option value="cancelled">בוטל</option>
          </select>
          <button onclick="updateStatus()" class="submit-btn">עדכן</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="utilities/sidebar.js"></script>
<script>
  let orders = [], currentOrderId = null;

  async function load() {
    const { data: ordersData, error } = await window._sb
      .from('orders')
      .select('*, order_items(*, products(name, emoji, image_url))')
      .order('created_at', { ascending: false });
    if (error) { console.error(error); return; }

    // טען פרטי לקוחות רשומים בנפרד
    const customerIds = [...new Set((ordersData ?? []).map(o => o.customer_id).filter(Boolean))];
    let customersMap = {};
    if (customerIds.length) {
      const { data: custs, error: custErr } = await window._sb
        .from('customers')
        .select('id, firstName, lastName, mobile, email')
        .in('id', customerIds);
      (custs ?? []).forEach(c => { customersMap[c.id] = c; });
    }

    orders = (ordersData ?? []).map(o => ({
      ...o,
      _customer: o.customer_id ? customersMap[o.customer_id] ?? null : null,
    }));
    renderKPIs();
    render();
  }

  function renderKPIs() {
    document.getElementById('kpi-total').textContent     = orders.length;
    document.getElementById('kpi-pending').textContent   = orders.filter(o => o.status === 'pending').length;
    document.getElementById('kpi-completed').textContent = orders.filter(o => o.status === 'completed').length;
    const rev = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + Number(o.total), 0);
    document.getElementById('kpi-revenue').textContent   = '₪' + rev.toFixed(0);
  }

  function render() {
    const q    = document.getElementById('searchInput').value.trim().toLowerCase();
    const st   = document.getElementById('statusFilter').value;
    const type = document.getElementById('typeFilter').value;

    const filtered = orders.filter(o => {
      const name  = o._customer ? `${o._customer.firstName ?? ''} ${o._customer.lastName ?? ''}`.trim() : o.guest_name ?? '';
      const phone = o._customer?.mobile ?? o.guest_phone ?? '';
      if (q && !name.toLowerCase().includes(q) && !phone.includes(q) && !String(o.id).includes(q)) return false;
      if (st && o.status !== st) return false;
      if (type === 'customer' && !o.customer_id) return false;
      if (type === 'guest'    &&  o.customer_id) return false;
      return true;
    });

    document.getElementById('countBadge').textContent = filtered.length;
    const tbody = document.getElementById('ordersBody');
    tbody.innerHTML = filtered.length ? filtered.map(o => {
      const name  = o._customer ? `${o._customer.firstName ?? ''} ${o._customer.lastName ?? ''}`.trim() : o.guest_name  ?? '—';
      const phone = o._customer?.mobile ?? o.guest_phone ?? '—';
      const items = o.order_items?.length ?? 0;
      const date  = new Date(o.created_at).toLocaleDateString('he-IL');
      const badge = `badge-${o.status}`;
      const label = { pending:'ממתין', completed:'הושלם', cancelled:'בוטל' }[o.status] ?? o.status;
      const isGuest = !o.customer_id;
      return `<tr>
        <td style="color:#9ca3af;font-size:12px;">#${o.id}</td>
        <td>${date}</td>
        <td>
          <strong>${name}</strong>
          ${isGuest ? '<span style="font-size:10px;background:#f3f0ff;color:#7c3aed;border-radius:999px;padding:1px 7px;margin-right:4px;">אורח</span>' : ''}
        </td>
        <td style="direction:ltr;text-align:right;">${phone}</td>
        <td>${items} פריטים</td>
        <td><strong>₪${Number(o.total).toFixed(2)}</strong></td>
        <td><span class="${badge}">${label}</span></td>
        <td>
          <button onclick="openOrder(${o.id})" style="background:#f3f0ff;color:#7c3aed;border:1px solid #ede9fe;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;">👁️ פרטים</button>
        </td>
      </tr>`;
    }).join('') : '<tr><td colspan="8" style="text-align:center;color:#9ca3af;padding:40px;">אין הזמנות</td></tr>';
  }

  function openOrder(id) {
    const o = orders.find(x => x.id === id);
    if (!o) return;
    currentOrderId = id;
    document.getElementById('modalTitle').textContent = `הזמנה #${o.id}`;
    document.getElementById('statusSelect').value = o.status;

    const name    = o._customer ? `${o._customer.firstName ?? ''} ${o._customer.lastName ?? ''}`.trim() : o.guest_name  ?? '—';
    const phone   = o._customer?.mobile ?? o.guest_phone ?? '—';
    const email   = o._customer?.email  ?? o.guest_email ?? '—';
    const address = o.guest_address ?? '—';
    const notes   = o.guest_notes   ?? '';
    const date    = new Date(o.created_at).toLocaleString('he-IL');
    const isGuest = !o.customer_id;

    const itemsHTML = (o.order_items ?? []).map(i => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f9fafb;">
        <div style="width:36px;height:36px;border-radius:8px;background:#f3f0ff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">
          ${i.products?.image_url
            ? `<img src="${i.products.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />`
            : (i.products?.emoji ?? '📦')}
        </div>
        <div style="flex:1;font-size:13px;font-weight:600;color:#1f2937;">${i.products?.name ?? 'מוצר'}</div>
        <div style="font-size:12px;color:#6b7280;">×${i.quantity}</div>
        <div style="font-size:13px;font-weight:700;color:#1f2937;">₪${Number(i.price * i.quantity).toFixed(2)}</div>
      </div>`).join('');

    document.getElementById('modalContent').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:#f8f7ff;border-radius:10px;padding:10px 14px;">
          <div style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px;">לקוח</div>
          <div style="font-size:14px;font-weight:700;color:#1f2937;">${name} ${isGuest ? '<span style="font-size:10px;background:#ede9fe;color:#7c3aed;border-radius:999px;padding:1px 7px;">אורח</span>' : ''}</div>
        </div>
        <div style="background:#f8f7ff;border-radius:10px;padding:10px 14px;">
          <div style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px;">תאריך</div>
          <div style="font-size:13px;color:#374151;">${date}</div>
        </div>
        <div style="background:#f8f7ff;border-radius:10px;padding:10px 14px;">
          <div style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px;">טלפון</div>
          <div style="font-size:13px;color:#374151;direction:ltr;text-align:right;">${phone}</div>
        </div>
        <div style="background:#f8f7ff;border-radius:10px;padding:10px 14px;">
          <div style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px;">אימייל</div>
          <div style="font-size:13px;color:#374151;">${email}</div>
        </div>
        ${address !== '—' ? `<div style="background:#f8f7ff;border-radius:10px;padding:10px 14px;grid-column:span 2;">
          <div style="font-size:10px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:4px;">כתובת</div>
          <div style="font-size:13px;color:#374151;">${address}</div>
        </div>` : ''}
        ${notes ? `<div style="background:#fef3c7;border-radius:10px;padding:10px 14px;grid-column:span 2;">
          <div style="font-size:10px;color:#92400e;font-weight:700;text-transform:uppercase;margin-bottom:4px;">הערות</div>
          <div style="font-size:13px;color:#374151;">${notes}</div>
        </div>` : ''}
      </div>
      <div style="font-size:12px;font-weight:700;color:#6b7280;margin-bottom:8px;">פריטים</div>
      ${itemsHTML}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:2px solid #f3f0ff;">
        <span style="font-size:14px;font-weight:700;color:#1f2937;">סה"כ</span>
        <span style="font-size:18px;font-weight:800;background:linear-gradient(135deg,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">₪${Number(o.total).toFixed(2)}</span>
      </div>`;

    document.getElementById('orderModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('orderModal').classList.remove('open');
    currentOrderId = null;
  }

  async function updateStatus() {
    if (!currentOrderId) return;
    const status = document.getElementById('statusSelect').value;
    const { error } = await window._sb.from('orders').update({ status }).eq('id', currentOrderId);
    if (error) { alert('שגיאה בעדכון: ' + error.message); return; }
    closeModal();
    await load();
  }

  document.getElementById('searchInput').addEventListener('input', render);
  document.getElementById('statusFilter').addEventListener('change', render);
  document.getElementById('typeFilter').addEventListener('change', render);

  load();
</script>
</body>
</html>

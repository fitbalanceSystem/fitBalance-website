<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>לקוחות</title>
  <!-- <link rel="stylesheet" href="css/weekly-calendar.css" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet" /> -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> -->
  <script type="module" src="js/weekly-calendar.js" defer></script>

  <link rel="stylesheet" href="css/admin-theme.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet" />
  <!-- <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../../services/supabaseClient.js"></script>
</head>

<body>
  <div style="display:flex; min-height:100vh;">
    <div id="sidebar-placeholder"></div>
    <script src="utilities/sidebar.js"></script>

    <main style="flex:1; min-width:0; overflow-x:auto;" class="main-content">
      <header class="page-header">
        <h1>מערכת שעות שבועית</h1>
      </header>

      <section id="schedule-container">
        <div class="toolbar">
          <button onclick="changeWeek(-1)">◀ שבוע קודם</button>
          <span id="week-range" style="font-weight:bold; margin:0 15px; font-size:16px;"></span>
          <button onclick="changeWeek(1)">שבוע הבא ▶</button>
        </div>
        <div class="calendar-container" style="margin-top:16px;">
          <div id="days-grid" class="days-grid"></div>
        </div>
      </section>
    </main>

    <!-- Modal לנוכחות -->
    <div id="attendanceModal" style="display:none; position:fixed; inset:0; background:rgba(15,10,40,.65); z-index:1000; align-items:center; justify-content:center; backdrop-filter:blur(4px);">
      <div style="background:white; border-radius:16px; padding:28px; max-width:700px; width:95vw; max-height:85vh; overflow-y:auto; box-shadow:0 25px 60px rgba(0,0,0,.2); position:relative; display:flex; flex-direction:column; gap:16px;">
        
        <!-- כותרת + סגירה -->
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="display:flex; align-items:center; gap:12px;">
            <h3 id="modalTitle" style="font-size:18px; font-weight:700; color:#1f2937; margin:0;">נוכחות</h3>
            <span id="attendanceRowCount" style="background:#f3f0ff; color:#7c3aed; border-radius:999px; padding:2px 12px; font-size:13px; font-weight:700;">0 משתתפות</span>
          </div>
          <button onclick="closeModal()" style="background:#f3f0ff; border:none; border-radius:50%; width:32px; height:32px; font-size:18px; cursor:pointer; color:#7c3aed; line-height:1;">&times;</button>
        </div>

        <!-- טבלה -->
        <div style="overflow-x:auto;">
          <table class="attendance-table" style="width:100%;">
            <thead>
              <tr>
                <th style="width:40px;">
                  <input type="checkbox" id="selectAllAttendance" title="סמן הכל" style="width:16px; height:16px; cursor:pointer;">
                </th>
                <th>שם</th>
                <th>נייד</th>
                <th>סטטוס</th>
                <th>מחיקה</th>
              </tr>
            </thead>
            <tbody id="attendanceTableBody"></tbody>
          </table>
        </div>

        <div class="modal-actions">
          <button class="btn-outline-pink" onclick="addCustomerRow()">➕ הוסף לקוחה</button>
          <button class="btn-solid-pink" onclick="updateAttendance()">💾 שמור</button>
        </div>
      </div>
    </div>

    <!-- רקע כהה שמכסה את כל המסך -->
    <div id="addParticipantModalOverlay" class="modal-overlay" style="display: none;"></div>

    <!-- מיני מודאל -->
    <div id="addParticipantModal" class="mini-modal" style="display: none;">
      <button class="close-btn" onclick="closeAddCustomerModal()">×</button>
      <h3>הוספת לקוחה למפגש</h3>
      <input type="text" id="customerSearchInput" placeholder="הקלד/י שם לקוחה..." autocomplete="off" />
      <ul id="autocompleteResults" class="autocomplete-list"></ul>
    </div>



  </div>


      <!-- כותרת דינאמית -->
      <!-- <h2 id="modalTitle2" class="text-2xl font-bold text-center text-pink-600 mb-6"></h2> -->

<!-- מודאל מפגש -->
<div id="sessionModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl p-6 relative animate-fadeIn">

    <!-- כפתור סגירה -->
    <button class="absolute top-3 left-3 text-gray-400 hover:text-gray-600 text-2xl close">&times;</button>

    <button id="programDetailsBtn" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition">
      📋 פרטי התוכנית
    </button>

    <!-- כותרת דינמית -->
       <h2 id="modalTitle2" class="text-2xl font-bold text-center text-pink-600 mb-6"></h2>

    <!-- Grid לשתי עמודות -->
    <div class="grid grid-cols-2 gap-4">

      <!-- עמודה שמאלית -->
      <div class="space-y-3">
        <!-- תאריך -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">תאריך:</label>
          <input type="date" id="modalDate" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-pink-400 focus:outline-none">
        </div>

        <!-- יום -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">יום:</label>
          <select id="modalDay" class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none"></select>
        </div>

        <!-- שעה -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">שעה:</label>
          <input type="time" id="modalTime" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-pink-400 focus:outline-none">
        </div>

        <!-- סטטוס + רדיו -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">סטטוס:</label>
          <select id="modalStatus" class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none"></select>

          <div id="makeupContainer" class="mt-2 hidden">
            <span class="text-gray-700 mr-2">האם יש השלמה?</span>
            <label class="inline-flex items-center mr-4">
              <input type="radio" name="makeup" value="yes" class="form-radio text-pink-600">
              <span class="ml-1">כן</span>
            </label>
            <label class="inline-flex items-center">
              <input type="radio" name="makeup" value="no" class="form-radio text-pink-600" checked>
              <span class="ml-1">לא</span>
            </label>
          </div>
        </div>
      </div>

      <!-- עמודה ימנית -->
      <div class="space-y-3">
        <!-- סניף -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">סניף:</label>
          <select id="modalBranch" class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none"></select>
        </div>

        <!-- מדריכה -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">מדריכה:</label>
          <select id="modalInstructor" class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none"></select>
        </div>

        <!-- הערות -->
        <div>
          <label class="block text-gray-700 font-medium mb-1">הערות:</label>
          <textarea id="modalNotes" class="w-full border rounded-lg p-2 bg-gray-50 focus:outline-none"></textarea>
        </div>
      </div>

    </div>

    <!-- כפתורים -->
    <div class="flex gap-2 mt-6">
      <button id="saveBtn" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-semibold py-2 rounded-lg transition">💾 שמור</button>
      <button id="attendanceBtn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-semibold py-2 rounded-lg transition">✅ נוכחות</button>
      <button id="deleteBtn" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 rounded-lg transition">🗑️ מחיקה</button>
    </div>

  </div>
</div>

<!-- מודאל תוכנית -->
<div id="programModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl p-5 relative animate-fadeIn">

    <!-- כפתור סגירה -->
    <button class="absolute top-2 left-2 text-gray-400 hover:text-gray-600 text-xl close-program">&times;</button>

    <!-- כותרת -->
    <h2 class="text-xl font-bold text-center text-blue-600 mb-4">פרטי תוכנית</h2>

    <!-- פרטי תוכנית - תצוגה בלבד -->
    <div class="text-sm text-gray-700 mb-4 space-y-1">

      <!-- שורה 1 -->
      <div class="flex justify-between">
        <span><b>שם:</b> <span id="pName"></span></span>
        <span><b>יום:</b> <span id="pDay"></span></span>
        <span><b>שעה:</b> <span id="pTime"></span></span>
        <span><b>סוג:</b> <span id="pType"></span></span>
      </div>

      <!-- שורה 2 -->
      <div class="flex justify-between">
        <span><b>סניף:</b> <span id="pBranch"></span></span>
        <span><b>מדריכה:</b> <span id="pInstructor"></span></span>
        <span><b>התחלה:</b> <span id="pStart"></span></span>
        <span><b>סיום:</b> <span id="pEnd"></span></span>
      </div>

      <div>
        <b>סטטוס:</b> <span id="pStatus"></span>
      </div>
    </div>

    <!-- טבלת מפגשים -->
    <h3 class="text-sm font-semibold mb-2 text-gray-700">מפגשי התוכנית</h3>
    <div class="border rounded-xl p-3 max-h-64 overflow-y-auto bg-gray-50 mb-4">
      <table class="w-full text-xs">
        <thead class="text-gray-600">
          <tr>
            <th class="p-2 text-center">
              <input type="checkbox" id="selectAllSessions">
            </th>
            <th class="p-2">תאריך</th>
            <th class="p-2">יום</th>
            <th class="p-2">שעה</th>
          </tr>
        </thead>
        <tbody id="programSessionsTable"></tbody>
      </table>
    </div>

    <button id="programSaveBtn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 rounded-xl transition">
      💾 שמור בחירה
    </button>

  </div>
</div>

 
<!-- מודאל בחירת תוכנית -->
<div id="programSelectModal" class="modal hidden">
  <div class="modal-content rounded-2xl bg-white shadow-xl p-6 w-full max-w-4xl max-h-[90vh] overflow-hidden animate-fadeIn">

    <h3 class="text-xl font-bold text-center mb-4 text-pink-600">בחר תוכנית</h3>

    <!-- טבלה עם גלילה פנימית -->
    <div class="overflow-y-auto max-h-80 border rounded-lg mb-4">
      <table class="w-full text-right border-collapse">
        <thead>
          <tr class="bg-gray-100 sticky top-0">
            <th class="p-2 border">שם תוכנית</th>
            <th class="p-2 border">יום</th>
            <th class="p-2 border">שעה</th>
            <th class="p-2 border">מדריכה</th>
            <th class="p-2 border">סניף</th>
            <th class="p-2 border">תאריך התחלה</th>
            <th class="p-2 border">תאריך סיום</th>
          </tr>
        </thead>
        <tbody id="programTableBody">
          <!-- כאן נטען כל תוכנית בשורה -->
        </tbody>
      </table>
    </div>

    <div class="flex justify-between gap-2">
      <button id="programSelectCancel" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 rounded-lg transition">
        ביטול
      </button>
      <button id="programSelectOk" class="flex-1 bg-pink-500 hover:bg-pink-600 text-white font-semibold py-2 rounded-lg transition" disabled>
        אישור
      </button>
    </div>
  </div>
</div>



<!-- ספינר גלובלי -->
<div id="globalLoader" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-[1000]">
  <div class="w-10 h-10 border-4 border-pink-400 border-t-transparent rounded-full animate-spin"></div>
</div>

</body>

</html>

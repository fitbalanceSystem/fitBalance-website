<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitBalance | פרופיל</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .info-row { display: flex; flex-direction: column; gap: 4px; }
    .info-label { font-size: 11px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; }
    .info-value { font-size: 14px; font-weight: 600; color: #1f2937; }
    .section-title {
      font-size: 13px; font-weight: 700; color: #374151;
      display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
    }
    .section-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .attendance-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 12px;
      background: #faf9ff; border: 1px solid #f3f0ff;
      transition: background .2s;
    }
    .attendance-row:hover { background: #f3f0ff; }
  </style>
</head>
<body>

<div class="page-content max-w-3xl mx-auto" style="padding: 28px; padding-top: 88px;">

  <!-- ===== HEADER CARD ===== -->
  <div class="card fade-in mb-5" style="background:linear-gradient(135deg,#1a1035,#3b1f7a);border:none;border-radius:20px;padding:28px">
    <div class="flex flex-col sm:flex-row items-center gap-5">
      <div style="width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#8b5cf6);display:flex;align-items:center;justify-content:center;color:white;font-size:24px;font-weight:700;border:3px solid rgba(255,255,255,.2);flex-shrink:0">
        <span id="avatar-initials"></span>
      </div>
      <div class="text-center sm:text-right flex-1">
        <h1 id="profile-name" class="text-xl font-bold text-white mb-1 skeleton h-6 w-36"></h1>
        <p id="profile-email" class="text-sm skeleton h-4 w-48" style="color:rgba(255,255,255,.5)"></p>
        <div class="flex flex-wrap gap-2 mt-3 justify-center sm:justify-start">
          <span id="plan-badge" class="badge skeleton h-6 w-24" style="background:rgba(236,72,153,.25);color:#f9a8d4"></span>
          <span id="member-since" class="badge skeleton h-6 w-28" style="background:rgba(139,92,246,.25);color:#c4b5fd"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== STATS ===== -->
  <div class="grid grid-cols-3 gap-4 mb-5 fade-in">
    <div class="card text-center" style="padding:20px 12px">
      <div id="stat-left" class="font-bold gradient-text skeleton h-8 w-10 mx-auto mb-1" style="font-size:28px">-</div>
      <div style="font-size:11px;color:#9ca3af;font-weight:600">נותרו להשלמה</div>
    </div>
    <div class="card text-center" style="padding:20px 12px">
      <div id="stat-next" class="font-bold gradient-text skeleton h-8 w-16 mx-auto mb-1" style="font-size:14px;line-height:1.3">-</div>
      <div style="font-size:11px;color:#9ca3af;font-weight:600">השיעור הקרוב</div>
    </div>
    <div class="card text-center" style="padding:20px 12px">
      <div id="stat-goal" class="font-bold gradient-text skeleton h-8 w-16 mx-auto mb-1" style="font-size:13px;line-height:1.3">-</div>
      <div style="font-size:11px;color:#9ca3af;font-weight:600">המטרה שלי</div>
    </div>
  </div>

  <!-- ===== PERSONAL DETAILS ===== -->
  <div class="card fade-in mb-5" style="padding:24px;border-radius:20px">

    <div class="section-title">
      <span class="section-icon" style="background:#f3f0ff">
        <i class="fas fa-user" style="color:#8b5cf6;font-size:12px"></i>
      </span>
      פרטים אישיים
    </div>

    <div class="grid grid-cols-2 gap-x-8 gap-y-5 mb-6">
      <div class="info-row">
        <span class="info-label">שם פרטי</span>
        <span id="f-firstName" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">שם משפחה</span>
        <span id="f-lastName" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">טלפון</span>
        <span id="f-mobile" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">אימייל</span>
        <span id="f-email" class="info-value" style="word-break:break-all">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">תאריך לידה</span>
        <span id="f-birthDate" class="info-value">—</span>
      </div>
    </div>

    <div style="height:1px;background:#f3f0ff;margin-bottom:20px"></div>

    <div class="section-title">
      <span class="section-icon" style="background:#fdf2f8">
        <i class="fas fa-map-marker-alt" style="color:#ec4899;font-size:12px"></i>
      </span>
      כתובת
    </div>

    <div class="grid grid-cols-3 gap-x-8 gap-y-5">
      <div class="info-row">
        <span class="info-label">עיר</span>
        <span id="f-city" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">רחוב</span>
        <span id="f-street" class="info-value">—</span>
      </div>
      <div class="info-row">
        <span class="info-label">מספר בית</span>
        <span id="f-houseNo" class="info-value">—</span>
      </div>
    </div>
  </div>

  <!-- ===== RECENT ATTENDANCE ===== -->
  <div class="card fade-in" style="padding:24px;border-radius:20px">
    <div class="section-title">
      <span class="section-icon" style="background:#f3f0ff">
        <i class="fas fa-history" style="color:#8b5cf6;font-size:12px"></i>
      </span>
      שיעורים אחרונים
    </div>
    <div id="recent-list" style="display:flex;flex-direction:column;gap:8px">
      <div class="skeleton" style="height:52px;border-radius:12px"></div>
      <div class="skeleton" style="height:52px;border-radius:12px"></div>
      <div class="skeleton" style="height:52px;border-radius:12px"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../services/supabaseClient.js"></script>
<script src="../../utils/constants.js"></script>
<script src="../../utils/storage.js"></script>
<script src="../../utils/cart.js"></script>
<script src="../../utils/formatter.js"></script>
<script src="../../utils/helpers.js"></script>
<script src="../../utils/popup.js"></script>
<script src="../../services/authService.js"></script>
<script src="../../services/customerService.js"></script>
<script src="../../services/attendanceService.js"></script>
<script src="../../middleware/auth.js"></script>
<script src="../../layouts/layout.js"></script>
<script src="../../assets/js/pages/customer/profile.js"></script>
</html>

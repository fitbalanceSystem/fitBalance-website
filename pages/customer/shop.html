<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitBalance | חנות</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .shop-layout { display:flex; flex-direction:column; height:calc(100vh - 64px); overflow:hidden; }
    .shop-top    { flex-shrink:0; padding:14px 24px 10px; background:white; border-bottom:1px solid #f3f0ff; }
    .shop-middle { flex:1; overflow-y:auto; padding:20px 24px; background:#f8f7ff; }
    .shop-bottom { flex-shrink:0; padding:10px 24px 14px; border-top:1px solid #f3f0ff; background:white; }

    #products-grid {
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:14px;
    }
    @media(max-width:1280px){ #products-grid{ grid-template-columns:repeat(4,1fr); } }
    @media(max-width:900px) { #products-grid{ grid-template-columns:repeat(3,1fr); } }
    @media(max-width:600px) { #products-grid{ grid-template-columns:repeat(2,1fr); gap:10px; } }

    .product-card {
      background:white; border-radius:14px; border:1px solid #f3f0ff;
      overflow:hidden; cursor:pointer;
      transition:transform .22s, box-shadow .22s;
      display:flex; flex-direction:column;
    }
    .product-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(139,92,246,.13); }

    .p-img {
      width:100%; aspect-ratio:1/1; overflow:hidden;
      background:linear-gradient(135deg,#fdf2f8,#f5f3ff);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .p-img img  { width:100%; height:100%; object-fit:cover; display:block; }
    .p-img .p-emoji { font-size:38px; line-height:1; }

    .p-body  { padding:12px 12px 14px; display:flex; flex-direction:column; flex:1; }
    .p-name  { font-size:14px; font-weight:700; color:#1f2937; margin-bottom:3px; line-height:1.3; }
    .p-desc  { font-size:12px; color:#9ca3af; margin-bottom:10px; flex:1; line-height:1.5;
               display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .p-footer{ display:flex; align-items:center; justify-content:space-between; gap:4px; }
    .p-price { font-size:15px; font-weight:800;
               background:linear-gradient(135deg,#ec4899,#8b5cf6);
               -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .p-add   { background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; border:none;
               border-radius:8px; padding:6px 12px; font-size:12px; font-weight:700;
               cursor:pointer; transition:opacity .15s; white-space:nowrap; }
    .p-add:hover { opacity:.85; }

    .cat-btn { white-space:nowrap; padding:6px 14px; border-radius:20px; font-size:12px;
               font-weight:600; border:1.5px solid #e5e7eb; background:white; color:#6b7280;
               cursor:pointer; transition:all .15s; }
    .cat-btn:hover  { border-color:#ec4899; color:#ec4899; }
    .cat-btn.active { background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; border-color:transparent; }

    #cart-drawer { transition:transform .3s ease; }
    #cart-drawer.open { transform:translateX(0) !important; }
    .qty-btn { width:28px; height:28px; border-radius:50%; border:2px solid #e5e7eb;
               display:flex; align-items:center; justify-content:center; cursor:pointer; font-weight:700; transition:all .15s; }
    .qty-btn:hover { border-color:#ec4899; color:#ec4899; }

    #product-modal { display:none; position:fixed; inset:0; background:rgba(15,10,40,.6);
                     z-index:60; align-items:center; justify-content:center; backdrop-filter:blur(4px); padding:16px; }
    #product-modal.open { display:flex; }

    .cart-fab { position:relative; display:flex; align-items:center; gap:7px;
                background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; border:none;
                border-radius:12px; padding:8px 18px; font-size:13px; font-weight:700;
                cursor:pointer; box-shadow:0 4px 14px rgba(236,72,153,.3); transition:opacity .2s; }
    .cart-fab:hover { opacity:.9; }
  </style>
</head>
<body>

<div class="page-content" style="padding:0;">
<div class="shop-layout">

  <!-- TOP: כותרת + פילטרים -->
  <div class="shop-top">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <h1 style="font-size:1.15rem;font-weight:800;color:#1f2937;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-shopping-bag" style="background:linear-gradient(135deg,#ec4899,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
        חנות FitBalance
      </h1>
      <button id="cart-btn" class="cart-fab">
        <i class="fas fa-shopping-cart"></i>
        <span>עגלה</span>
        <span id="cart-count" style="position:absolute;top:-8px;left:-8px;min-width:20px;height:20px;background:white;color:#ec4899;border-radius:999px;font-size:11px;font-weight:800;display:none;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 2px 6px rgba(0,0,0,.15);">0</span>
      </button>
    </div>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;" id="cat-filters">
      <button class="cat-btn active" data-cat="all">הכל</button>
    </div>
  </div>

  <!-- MIDDLE: גריד מוצרים (גלילה) -->
  <div class="shop-middle">
    <div id="products-grid">
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:14px;"></div>
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:14px;"></div>
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:14px;"></div>
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:14px;"></div>
      <div class="skeleton" style="aspect-ratio:1/1;border-radius:14px;"></div>
    </div>
  </div>

  <!-- BOTTOM: הזמנות קודמות -->
  <div class="shop-bottom">
    <h2 class="font-bold text-gray-700 mb-2 flex items-center gap-2" style="font-size:13px;">
      <i class="fas fa-receipt text-purple-500"></i> הזמנות קודמות
    </h2>
    <div id="orders-list" class="flex gap-3 overflow-x-auto pb-1"></div>
  </div>

</div>
</div>

<!-- Cart drawer -->
<div id="cart-drawer" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl z-50 flex flex-col" style="transform:translateX(100%)">
  <div class="flex items-center justify-between p-5 border-b">
    <h2 class="text-lg font-bold text-gray-800">🛒 עגלת קניות</h2>
    <button id="close-cart" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
  </div>
  <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
  <div class="p-5 border-t">
    <!-- קופון -->
    <div style="display:flex;gap:6px;margin-bottom:12px;">
      <input id="coupon-input" type="text" placeholder="קוד קופון" style="flex:1;border:1.5px solid #e5e7eb;border-radius:10px;padding:7px 10px;font-size:13px;outline:none;font-family:inherit;" />
      <button id="coupon-btn" style="background:#f3f0ff;color:#7c3aed;border:1px solid #ede9fe;border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">הפעל</button>
    </div>
    <div id="coupon-msg" style="font-size:12px;margin-bottom:8px;display:none;"></div>
    <div class="flex justify-between text-gray-500 text-sm mb-1" id="subtotal-row" style="display:none !important;">
      <span>סכום ערך</span><span id="cart-subtotal"></span>
    </div>
    <div class="flex justify-between text-green-600 text-sm font-semibold mb-1" id="discount-row" style="display:none;">
      <span id="discount-label">הנחה</span><span id="discount-amount"></span>
    </div>
    <div class="flex justify-between text-lg font-bold text-gray-800 mb-4">
      <span>סה"כ</span>
      <span id="cart-total" class="gradient-text">₪0</span>
    </div>
    <button id="checkout-btn" class="btn-primary w-full flex items-center justify-center gap-2">
      <i class="fas fa-credit-card"></i> לתשלום
    </button>
  </div>
</div>
<div id="cart-overlay" class="fixed inset-0 bg-black bg-opacity-40 z-40 hidden"></div>

<!-- Product modal -->
<div id="product-modal">
  <div style="background:white; border-radius:20px; width:420px; max-width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 25px 60px rgba(0,0,0,.25);">
    <div style="padding:20px 20px 0; display:flex; justify-content:flex-end;">
      <button onclick="document.getElementById('product-modal').classList.remove('open')" style="background:#f3f0ff; border:none; color:#7c3aed; width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer;">✕</button>
    </div>
    <div style="padding:0 20px 24px;">
      <div id="pm-media"></div>
      <h2 id="pm-name" style="font-size:20px; font-weight:800; color:#1f2937; margin-bottom:6px;"></h2>
      <p id="pm-category" style="font-size:12px; color:#9ca3af; margin-bottom:10px;"></p>
      <p id="pm-desc" style="font-size:14px; color:#6b7280; margin-bottom:16px; line-height:1.6;"></p>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
        <span id="pm-price" style="font-size:24px; font-weight:800; background:linear-gradient(135deg,#ec4899,#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></span>
        <span id="pm-stock" style="font-size:12px; color:#9ca3af;"></span>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="display:flex; align-items:center; gap:8px; background:#f9fafb; border-radius:12px; padding:6px 12px;">
          <button class="qty-btn" id="pm-minus">−</button>
          <span id="pm-qty" style="font-size:16px; font-weight:700; min-width:24px; text-align:center;">1</span>
          <button class="qty-btn" id="pm-plus">+</button>
        </div>
        <button id="pm-add-btn" style="flex:1; background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; border:none; border-radius:12px; padding:12px; font-size:14px; font-weight:700; cursor:pointer;">הוסף לעגלה</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../../utils/constants.js"></script>
<script src="../../utils/storage.js"></script>
<script src="../../utils/cart.js"></script>
<script src="../../utils/formatter.js"></script>
<script src="../../utils/helpers.js"></script>
<script src="../../utils/popup.js"></script>
<script src="../../services/supabaseClient.js"></script>
<script src="../../services/authService.js"></script>
<script src="../../services/customerService.js"></script>
<script src="../../middleware/auth.js"></script>
<script src="../../layouts/layout.js"></script>
<script src="../../assets/js/pages/customer/shop.js"></script>
</body>
</html>

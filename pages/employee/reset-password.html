<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitBalance | איפוס סיסמה</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fce7f3, #ede9fe); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.92); border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.12); padding: 2rem; width: 100%; max-width: 380px; }
    .input-field { width:100%; padding:.6rem .9rem; border:2px solid #e5e7eb; border-radius:.65rem; font-size:.9rem; outline:none; }
    .input-field:focus { border-color:#ec4899; box-shadow:0 0 0 3px rgba(236,72,153,.1); }
    .btn-primary { width:100%; padding:.7rem; border:none; cursor:pointer; background:linear-gradient(135deg,#ec4899,#8b5cf6); color:white; font-size:.9rem; font-weight:600; border-radius:.65rem; }
    .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h1 class="text-xl font-bold text-gray-800">איפוס סיסמה</h1>
      <p class="text-gray-400 text-sm mt-1">הכניסי סיסמה חדשה לחשבונך</p>
    </div>

    <div id="error-msg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl p-3 text-sm mb-4"></div>
    <div id="success-msg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl p-3 text-sm mb-4"></div>

    <form id="reset-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">סיסמה חדשה</label>
        <input id="new-password" type="password" class="input-field" placeholder="לפחות 6 תווים" required />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">אימות סיסמה</label>
        <input id="confirm-password" type="password" class="input-field" placeholder="הכניסי שוב את הסיסמה" required />
      </div>
      <button type="submit" id="submit-btn" class="btn-primary">עדכון סיסמה</button>
    </form>

    <div class="text-center mt-4">
      <a href="/login.html" class="text-sm text-pink-600 hover:underline">חזרה לכניסה</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/services/supabaseClient.js"></script>
  <script>
    const form        = document.getElementById('reset-form');
    const newPass     = document.getElementById('new-password');
    const confirmPass = document.getElementById('confirm-password');
    const errorMsg    = document.getElementById('error-msg');
    const successMsg  = document.getElementById('success-msg');
    const submitBtn   = document.getElementById('submit-btn');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove('hidden');
      successMsg.classList.add('hidden');
    }

    // Supabase מעביר את ה-token בה-URL hash — מאזינים לאירוע
    window._sb.auth.onAuthStateChange(async (event) => {
      if (event === 'PASSWORD_RECOVERY') {
        form.classList.remove('hidden');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = newPass.value.trim();
      const p2 = confirmPass.value.trim();

      if (p1.length < 6) { showError('הסיסמה חייבת להכיל לפחות 6 תווים'); return; }
      if (p1 !== p2)     { showError('הסיסמאות אינן תואמות'); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = 'מעדכן...';
      errorMsg.classList.add('hidden');

      const { error } = await window._sb.auth.updateUser({ password: p1 });

      if (error) {
        const isSame = error.message?.toLowerCase().includes('same') ||
                       error.code === 'same_password' ||
                       error.status === 422;
        showError(isSame
          ? 'הסיסמה החדשה זהה לסיסמה הנוכחית. אנא בחרי סיסמה שונה'
          : 'שגיאה בעדכון הסיסמה, נסי שוב'
        );
        submitBtn.disabled = false;
        submitBtn.textContent = 'עדכון סיסמה';
        return;
      }

      successMsg.textContent = 'הסיסמה עודכנה בהצלחה! מועברת לכניסה...';
      successMsg.classList.remove('hidden');
      form.classList.add('hidden');
      setTimeout(() => window.location.href = '/login.html', 2500);
    });
  </script>
</body>
</html>
